name: Render Keep-Alive

on:
  schedule:
    - cron: '*/20 * * * *' # Runs every 20 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Portfolio Compass
        run: |
          curl -s https://portfolio-compass-k4aw.onrender.com/ > /dev/null
          echo "Pulse sent to Portfolio Compass at $(date)"
